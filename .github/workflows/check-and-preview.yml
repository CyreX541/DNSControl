name: Check and Preview DNS changes

on: pull_request

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - name: write a message
        uses: thollander/actions-comment-pull-request@v3.0.1
        with:
          message: |
            Run ID: ${{ github.run_id }} | Attempt: ${{ github.run_attempt }}
            ```
            Syntax check is being performed. Please wait a few seconds and refresh the page.
            ```
          comment-tag: "preview${{ github.run_id }}-${{ github.run_attempt }}"
          mode: upsert

      - name: Syntax Check of DNS configuration
        uses: Jniklas2/DNSControl-Action@v4.29.0
        with:
          args: check

      - name: write a message if check was successful
        uses: thollander/actions-comment-pull-request@v3.0.1
        if: ${{ success() }}
        with:
          message: |
            Run ID: ${{ github.run_id }} | Attempt: ${{ github.run_attempt }}
            ```
            Syntax check passed.
            ```
          comment-tag: "preview${{ github.run_id }}-${{ github.run_attempt }}"
          mode: upsert

      - name: write a message if syntax check failed
        uses: thollander/actions-comment-pull-request@v3.0.1
        if: ${{ failure() }}
        with:
          message: |
            Run ID: ${{ github.run_id }} | Attempt: ${{ github.run_attempt }}
            ```
            Syntax check failed.
            ```
          comment-tag: "preview${{ github.run_id }}-${{ github.run_attempt }}"
          mode: upsert

      - name: write a message if syntax check was aborted
        uses: thollander/actions-comment-pull-request@v3.0.1
        if: ${{ cancelled() }}
        with:
          message: |
            Run ID: ${{ github.run_id }} | Attempt: ${{ github.run_attempt }}
            ```
            Syntax check was aborted.
            ```
          comment-tag: "preview${{ github.run_id }}-${{ github.run_attempt }}"
          mode: upsert

  preview:
    # runs-on: self-hosted
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6.0.1

      - name: write a info message
        uses: thollander/actions-comment-pull-request@v3.0.1
        with:
          message: |
            Run ID: ${{ github.run_id }} | Attempt: ${{ github.run_attempt }}
            ```
            Preview is being generated. Please wait a few minutes and refresh the page.
            ```
          comment-tag: "preview${{ github.run_id }}-${{ github.run_attempt }}"
          mode: upsert

      - name: Preview DNS changes
        id: preview
        uses: Jniklas2/DNSControl-Action@v4.29.0
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          args: preview

      - name: Comment diff on PR
        uses: thollander/actions-comment-pull-request@v3.0.1
        if: ${{ success() }}
        with:
          message: |
            Run ID: ${{ github.run_id }} | Attempt: ${{ github.run_attempt }}
            ```
            ${{ steps.preview.outputs.output }}
            ```
          comment-tag: "preview${{ github.run_id }}-${{ github.run_attempt }}"
          mode: upsert
          reactions: "+1"

      - name: Comment on PR if preview failed
        uses: thollander/actions-comment-pull-request@v3.0.1
        if: ${{ failure() }}
        with:
          message: |
            Run ID: ${{ github.run_id }} | Attempt: ${{ github.run_attempt }}
            ```
            Generating preview failed.
            ```
          comment-tag: "preview${{ github.run_id }}-${{ github.run_attempt }}"
          mode: upsert
          reactions: "-1"

      - name: write a message if preview was aborted
        uses: thollander/actions-comment-pull-request@v3.0.1
        if: ${{ cancelled() }}
        with:
          message: |
            Run ID: ${{ github.run_id }} | Attempt: ${{ github.run_attempt }}
            ```
            Preview generation was aborted.
            ```
          comment-tag: "preview${{ github.run_id }}-${{ github.run_attempt }}"
          mode: upsert
